name: Build and run tests

on:
  pull_request:
    branches: [ master, rc/*, feat/* ]
    types: [ opened, ready_for_review ]
  push:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.23.6]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Build exchange contract
      run: |
        cd test/contracts/exchange
        mxpy contract build

    - name: Test
      run: |
        make test
    - name: Debug folders
      run: |
        pwd
        find . -type d | grep exchange
    - name: Find wasm
      run: |
        find . -name "*.wasm"